<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → JPG Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>PDF <span>→</span> JPG</h1>
  <p>Multi-file · Client-side · High fidelity</p>
</header>

<main>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf" multiple>
    <div class="drop-icon">📄</div>
    <h2>Drop your PDFs here</h2>
    <p>Multiple files supported &nbsp;·&nbsp; processed entirely in-browser</p>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="setting-item">
      <label>Page Range</label>
      <select id="pageRange">
        <option value="all">All pages</option>
        <option value="first">First page only</option>
        <option value="custom">Custom range…</option>
      </select>
    </div>
    <div class="setting-item" id="customRangeItem">
      <label>Pages (e.g. 1-3, 5)</label>
      <input type="text" id="customRange" class="custom-range-input" placeholder="1-3, 5">
    </div>
    <div class="setting-item">
      <label>Scale (DPI quality)</label>
      <div class="range-wrapper">
        <input type="range" id="scaleRange" min="1" max="4" step="0.5" value="3">
        <span class="range-value" id="scaleVal">3×</span>
      </div>
    </div>
    <div class="setting-item">
      <label>JPEG Quality</label>
      <div class="range-wrapper">
        <input type="range" id="qualityRange" min="60" max="100" step="5" value="95">
        <span class="range-value" id="qualityVal">95%</span>
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <button class="btn-primary" id="convertBtn" disabled>⚡ Convert All</button>
    <button class="btn-secondary" id="clearBtn" disabled>Clear All</button>
    <button class="btn-dl-all" id="dlAllBtn" disabled>↓ Download All</button>
  </div>

  <!-- Overall progress -->
  <div class="overall-progress" id="overallProgress">
    <div class="overall-label">
      <span id="overallText">Converting…</span>
      <span id="overallCount">0 / 0</span>
    </div>
    <div class="overall-track">
      <div class="overall-fill" id="overallFill"></div>
    </div>
  </div>

  <!-- File Queue -->
  <div class="queue-section" id="queueSection" style="display:none">
    <div class="queue-header">
      <h3>Files queued</h3>
      <span id="queueCount">0 files</span>
    </div>
    <div class="queue-list" id="queueList"></div>
  </div>

  <!-- Results -->
  <section class="results-section" id="resultsSection">
    <p class="results-section-title">Converted images</p>
    <div id="resultsContainer"></div>
  </section>

</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="Preview">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
